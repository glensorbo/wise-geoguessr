name: PR Checks

on:
  pull_request:
    branches:
      - main
      - test
      - prod

jobs:
  quality:
    name: Run Tests and Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Run tests
        run: bun run test

      - name: 🧹 Run oxlint
        run: bun run lint

      - name: 🔍 Run React Compiler linting
        run: bun run lint:compiler

      - name: ✨ Check formatting
        run: bun run format:check

      - name: 🔎 Check for unused exports (knip)
        run: bun run knip

      - name: 🏗️ Build project
        run: bun run build

  e2e:
    name: Run self-contained E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🐳 Verify Docker Compose
        run: docker compose version

      - name: 🎭 Run Docker E2E stack
        run: bun run e2e:docker
