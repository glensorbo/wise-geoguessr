x-common: &common
  networks:
    - rybbit-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: '3'

services:
  rybbit-caddy:
    <<: *common
    image: caddy:2.10.0
    container_name: rybbit-caddy
    ports:
      - '8090:8090'
    volumes:
      - ./docker/rybbit/Caddyfile:/etc/caddy/Caddyfile
      - rybbit-caddy-data:/data
      - rybbit-caddy-config:/config
    depends_on:
      rybbit-backend:
        condition: service_healthy
      rybbit-client:
        condition: service_started

  rybbit-clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.4.2
    container_name: rybbit-clickhouse
    environment:
      - CLICKHOUSE_DB=${RYBBIT_CLICKHOUSE_DB:-analytics}
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${RYBBIT_CLICKHOUSE_PASSWORD:-rybbit_click}
    volumes:
      - rybbit-clickhouse-data:/var/lib/clickhouse
      - rybbit-clickhouse-logs:/var/log/clickhouse-server
    configs:
      - source: rybbit_clickhouse_network
        target: /etc/clickhouse-server/config.d/network.xml
      - source: rybbit_clickhouse_json
        target: /etc/clickhouse-server/config.d/enable_json.xml
      - source: rybbit_clickhouse_logging
        target: /etc/clickhouse-server/config.d/logging_rules.xml
    healthcheck:
      test:
        [
          CMD,
          wget,
          --no-verbose,
          --tries=1,
          --spider,
          'http://127.0.0.1:8123/ping',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144

  rybbit-postgres:
    <<: *common
    image: postgres:17.4
    container_name: rybbit-postgres
    environment:
      - POSTGRES_DB=${RYBBIT_POSTGRES_DB:-analytics}
      - POSTGRES_USER=${RYBBIT_POSTGRES_USER:-rybbit}
      - POSTGRES_PASSWORD=${RYBBIT_POSTGRES_PASSWORD:-rybbit_pass}
    volumes:
      - rybbit-postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test:
        [
          CMD-SHELL,
          'pg_isready -U ${RYBBIT_POSTGRES_USER:-rybbit} -d ${RYBBIT_POSTGRES_DB:-analytics}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  rybbit-backend:
    <<: *common
    image: ghcr.io/rybbit-io/rybbit-backend:latest
    container_name: rybbit-backend
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - CLICKHOUSE_HOST=http://rybbit-clickhouse:8123
      - CLICKHOUSE_DB=${RYBBIT_CLICKHOUSE_DB:-analytics}
      - CLICKHOUSE_PASSWORD=${RYBBIT_CLICKHOUSE_PASSWORD:-rybbit_click}
      - POSTGRES_HOST=rybbit-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${RYBBIT_POSTGRES_DB:-analytics}
      - POSTGRES_USER=${RYBBIT_POSTGRES_USER:-rybbit}
      - POSTGRES_PASSWORD=${RYBBIT_POSTGRES_PASSWORD:-rybbit_pass}
      - BETTER_AUTH_SECRET=${RYBBIT_AUTH_SECRET:-change-me-rybbit-secret-32chars!!}
      - BASE_URL=${RYBBIT_BASE_URL:-http://127.0.0.1:8090}
      - DISABLE_SIGNUP=${RYBBIT_DISABLE_SIGNUP:-false}
    depends_on:
      rybbit-clickhouse:
        condition: service_healthy
      rybbit-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          CMD,
          wget,
          --no-verbose,
          --tries=1,
          --spider,
          'http://127.0.0.1:3001/api/health',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  rybbit-client:
    <<: *common
    image: ghcr.io/rybbit-io/rybbit-client:latest
    container_name: rybbit-client
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=${RYBBIT_BASE_URL:-http://127.0.0.1:8090}
    depends_on:
      rybbit-backend:
        condition: service_healthy

configs:
  rybbit_clickhouse_network:
    content: |
      <clickhouse>
          <listen_host>0.0.0.0</listen_host>
      </clickhouse>

  rybbit_clickhouse_json:
    content: |
      <clickhouse>
          <settings>
              <enable_json_type>1</enable_json_type>
          </settings>
      </clickhouse>

  rybbit_clickhouse_logging:
    content: |
      <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
        <latency_log remove="remove"/>
        <processors_profile_log remove="remove"/>
      </clickhouse>

networks:
  rybbit-net:
    name: rybbit-net

volumes:
  rybbit-clickhouse-data:
    name: rybbit-clickhouse-data
  rybbit-clickhouse-logs:
    name: rybbit-clickhouse-logs
  rybbit-postgres-data:
    name: rybbit-postgres-data
  rybbit-caddy-data:
    name: rybbit-caddy-data
  rybbit-caddy-config:
    name: rybbit-caddy-config
